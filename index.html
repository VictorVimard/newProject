<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Road Trip Dolomites - Itinéraire & Activités</title>
    <script>
        window.GOOGLE_MAPS_API_KEY = "__GOOGLE_MAPS_API_KEY__";
    </script>
    <script src="config.local.js"></script>
    <script src="app.js?v=__APP_VERSION__" defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #445;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.82), rgba(255, 255, 255, 0.82)),
                url('dolomz_img1.jpg'),
                url('dolomz_img2.jpg');
            background-size: auto, 120px 120px, 120px 120px;
            background-repeat: no-repeat, repeat, repeat;
            background-position: center center, 0 0, 60px 60px;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            display: flex;
            gap: 20px;
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            height: calc(100vh - 40px);
        }

        /* SIDEBAR */
        .sidebar {
            width: 300px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow-y: auto;
            padding: 20px 0;
            color: white;
        }

        .sidebar h1 {
            padding: 20px;
            font-size: 24px;
            border-bottom: 2px solid rgba(255,255,255,0.2);
            text-align: center;
            margin-bottom: 10px;
        }

        .day-item {
            padding: 12px 20px;
            border-left: 4px solid transparent;
            cursor: pointer;
            transition: all 0.3s;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .day-item:hover {
            background: rgba(255,255,255,0.1);
            transform: translateX(5px);
        }

        .day-item.active {
            background: rgba(255,255,255,0.25);
            border-left-color: #ffd700;
        }

        .day-title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .accommodation-name {
            font-size: 12px;
            opacity: 0.9;
        }

        /* MAIN CONTENT */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-bottom: 3px solid #ffd700;
        }

        .header h2 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: block;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 20px;
            flex-wrap: wrap;
        }

        .view-tabs {
            display: inline-flex;
            gap: 8px;
            padding: 6px;
            border-radius: 999px;
            background: rgba(255,255,255,0.16);
        }

        .view-tab {
            border: none;
            border-radius: 999px;
            padding: 10px 16px;
            font-size: 13px;
            font-weight: 700;
            color: white;
            background: transparent;
            cursor: pointer;
            transition: background 0.25s ease, color 0.25s ease;
        }

        .view-tab.active {
            background: white;
            color: #5a47a5;
        }

        .view-panel {
            display: none;
        }

        .view-panel.active {
            display: block;
        }

        .explore-view.active {
            display: flex;
            gap: 30px;
        }

        .planning-view {
            width: 100%;
        }

        .planning-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
            gap: 18px;
        }

        .planning-day {
            background: linear-gradient(180deg, #ffffff 0%, #f7f8ff 100%);
            border: 1px solid #dfe3ff;
            border-radius: 16px;
            padding: 18px;
            box-shadow: 0 12px 28px rgba(42, 52, 113, 0.08);
        }

        .planning-day.active {
            border-color: #667eea;
            box-shadow: 0 14px 32px rgba(102, 126, 234, 0.18);
        }

        .planning-day-header {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .planning-day-title {
            font-size: 17px;
            font-weight: 700;
            color: #223;
        }

        .planning-day-date {
            font-size: 12px;
            color: #667eea;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .planning-day-subtitle {
            margin-top: 4px;
            color: #556;
            font-size: 13px;
            line-height: 1.4;
        }

        .planning-summary-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }

        .planning-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border-radius: 999px;
            background: #eef1ff;
            color: #334;
            font-size: 12px;
            font-weight: 600;
        }

        .planning-route {
            padding: 12px;
            border-radius: 12px;
            background: #f8f6e8;
            border: 1px solid #eadfa9;
            color: #594b11;
            font-size: 12px;
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .planning-day-body {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .planning-item {
            padding: 12px 14px;
            border-radius: 12px;
            background: white;
            border: 1px solid #e7e9f5;
        }

        .planning-item.travel {
            background: #fff8e7;
            border-color: #f2dea0;
        }

        .planning-item-title {
            font-weight: 700;
            color: #223;
            margin-bottom: 4px;
            font-size: 13px;
        }

        .planning-item-meta {
            font-size: 12px;
            color: #5a6285;
            margin-bottom: 4px;
        }

        .planning-item-desc {
            font-size: 12px;
            color: #555;
            line-height: 1.45;
        }

        .planning-open-btn {
            margin-top: 14px;
        }

        .planning-empty {
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            color: #667;
            background: #f7f8ff;
            border: 1px dashed #ccd3ff;
        }

        .left-panel {
            flex: 1;
            min-width: 0;
        }

        .right-panel {
            flex: 1.15;
            min-width: 0;
            position: sticky;
            top: 10px;
            align-self: flex-start;
        }

        .accommodation-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }

        .accommodation-section h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .accommodation-section p {
            color: #555;
            font-size: 14px;
            margin: 5px 0;
        }

        .location-link {
            color: #667eea;
            text-decoration: none;
            cursor: pointer;
            font-weight: 500;
        }

        .location-link:hover {
            text-decoration: underline;
        }

        .travel-info {
            background: #fff3cd;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #ffc107;
            font-size: 14px;
        }

        .travel-info strong {
            color: #ff6b6b;
        }

        .start-origin {
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
            background: #eef7ff;
            border-left: 4px solid #4285f4;
            color: #223;
            font-size: 13px;
        }

        .activities-section h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .activity {
            background: white;
            border: 1px solid #e0e0e0;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .activity:hover {
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
            transform: translateY(-2px);
            border-color: #667eea;
        }

        .activity.selected {
            background: #f0f4ff;
            border-color: #667eea;
            border-width: 2px;
        }

        .activity.unavailable {
            opacity: 0.65;
            border-style: dashed;
            border-color: #999;
            cursor: not-allowed;
        }

        .activity.unavailable:hover {
            box-shadow: none;
            transform: none;
            border-color: #999;
        }

        .activity-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
            font-size: 15px;
        }

        .activity-type {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 11px;
            font-weight: 600;
            margin-right: 8px;
            margin-bottom: 8px;
        }

        .activity-type.hike {
            background: #28a745;
        }

        .activity-type.site {
            background: #ffc107;
            color: #333;
        }

        .activity-duration {
            color: #666;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .activity-distance {
            color: #667eea;
            font-size: 13px;
            font-weight: 500;
        }

        .activity-description {
            color: #666;
            font-size: 13px;
            margin-top: 8px;
            line-height: 1.4;
        }

        .activity-buttons {
            margin-top: 10px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-maps {
            background: #4285f4;
            color: white;
        }

        .btn-maps:hover {
            background: #1f6db9;
        }

        .btn-info {
            background: #e0e0e0;
            color: #333;
        }

        .btn-info:hover {
            background: #d0d0d0;
        }

        .btn-chain {
            background: #ff6b6b;
            color: white;
            font-size: 11px;
        }

        .btn-chain:hover {
            background: #ff5252;
        }

        .map-container {
            width: 100%;
            height: 520px;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #e0e0e0;
            margin-bottom: 20px;
        }

        .activity-extra {
            margin-top: 10px;
            padding: 10px;
            background: #f7f9fc;
            border: 1px solid #dbe4ff;
            border-radius: 8px;
            font-size: 12px;
            color: #445;
            line-height: 1.4;
        }

        .activity-extra strong {
            color: #334;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .chains-section {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .chains-section h4 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .chain-option {
            background: white;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 5px;
            border-left: 3px solid #667eea;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 13px;
        }

        .chain-option:hover {
            background: #f0f4ff;
        }

        .chain-steps {
            margin-top: 8px;
            color: #445;
            font-size: 12px;
            line-height: 1.5;
        }

        .planner-summary {
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
            background: #f6fbff;
            border: 1px solid #cfe6ff;
            font-size: 12px;
            color: #233;
            line-height: 1.5;
        }

        .planner-status {
            margin-top: 8px;
            font-weight: 700;
            padding: 6px 8px;
            border-radius: 6px;
        }

        .planner-status.ok {
            background: #dbf8e2;
            color: #166534;
        }

        .planner-status.over {
            background: #ffe4e4;
            color: #991b1b;
        }

        .no-content {
            color: #999;
            text-align: center;
            padding: 40px;
            font-size: 14px;
        }

        @media (max-width: 1200px) {
            .explore-view.active {
                flex-direction: column;
            }
            
            .right-panel {
                position: static;
                top: auto;
                max-height: none;
            }

            .map-container {
                height: 420px;
            }
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                height: auto;
            }

            .header-top {
                align-items: flex-start;
            }

            .view-tabs {
                width: 100%;
                justify-content: space-between;
            }

            .sidebar {
                width: 100%;
                max-height: 150px;
                display: flex;
                overflow-x: auto;
                overflow-y: hidden;
            }

            .day-item {
                flex-shrink: 0;
                min-width: 150px;
            }
        }

        .emoji {
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <h1>🗓️ Itinéraire</h1>
            <div id="daysList"></div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="main-content">
            <div class="header">
                <div class="header-top">
                    <div>
                        <h2 id="dayTitle">Jour 1</h2>
                        <p id="daySubtitle">Bienvenue en Lombardie</p>
                    </div>
                    <div class="view-tabs" aria-label="Mode d'affichage">
                        <button id="exploreTab" class="view-tab active" onclick="setView('explore')">Carte & détails</button>
                        <button id="planningTab" class="view-tab" onclick="setView('planning')">Planning</button>
                    </div>
                </div>
            </div>

            <div class="content-area">
                <div id="exploreView" class="view-panel explore-view active">
                    <!-- LEFT PANEL: Activities -->
                    <div class="left-panel">
                        <div id="accommodationInfo"></div>
                        <div id="travelInfo"></div>
                        <div class="activities-section">
                            <h3>📍 Activités & Sites à proximité</h3>
                            <div id="activitiesList"></div>
                        </div>
                    </div>

                    <!-- RIGHT PANEL: Map -->
                    <div class="right-panel">
                        <div class="map-container">
                            <div id="map"></div>
                        </div>
                        <div id="chainsSection"></div>
                    </div>
                </div>

                <div id="planningView" class="view-panel planning-view"></div>
            </div>
        </div>
    </div>

    <script src="data.js?v=__APP_VERSION__"></script>
</body>
</html>
